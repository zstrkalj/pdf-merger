name: Build Windows Executable

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Windows executable
        shell: pwsh
        run: |
          pyinstaller `
            --onefile `
            --windowed `
            --name SalConsultingPDFMerger `
            --paths src `
            --collect-all fitz `
            --hidden-import pdf_merger `
            --hidden-import pdf_merger.core.merger `
            --hidden-import pdf_merger.ui.main_window `
            --hidden-import pdf_merger.ui.page_select_dialog `
            main.py

      - name: Upload executable artifact
        uses: actions/upload-artifact@v4
        with:
          name: SalConsultingPDFMerger-windows
          path: dist\SalConsultingPDFMerger.exe
          if-no-files-found: error
